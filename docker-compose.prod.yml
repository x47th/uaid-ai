version: "3.8"

services:
  neo4j:
    image: neo4j:5
    environment:
      - NEO4J_AUTH=neo4j/CHANGE_ME
    ports: ["7474:7474", "7687:7687"]
    volumes: [neo4j_data:/data]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7474"]

  qdrant:
    image: qdrant/qdrant:latest
    ports: ["6333:6333", "6334:6334"]
    volumes: [qdrant_data:/qdrant/storage]

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=horizon
      - POSTGRES_PASSWORD=CHANGE_ME
      - POSTGRES_DB=horizon
    ports: ["5432:5432"]
    volumes: [pg_data:/var/lib/postgresql/data]

  horizon-api:
    build: ./project-horizon
    ports: ["3000:3000"]
    environment:
      - DATABASE_URL=postgresql://horizon:CHANGE_ME@postgres:5432/horizon
      - JWT_SECRET=CHANGE_ME
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - NODE_ENV=production
    depends_on: [postgres]
    restart: unless-stopped

  graphrag-api:
    build: ./uaid_core
    ports: ["3001:3001"]
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=CHANGE_ME
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
    depends_on: [neo4j, qdrant]
    restart: unless-stopped

  uaid-frontend:
    build: ./uaid-frontend
    ports: ["80:80"]
    depends_on: [horizon-api, graphrag-api]
    restart: unless-stopped

volumes:
  neo4j_data:
  qdrant_data:
  pg_data: