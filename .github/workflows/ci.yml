name: UAID CI/CD
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22' }
      - working-directory: project-horizon
        run: |
          npm ci
          npx prisma generate
          npm run test
          npm run build

  test-agents:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - working-directory: uaid_agents
        run: |
          pip install -r requirements.txt
          python -m pytest test_harness.py --tb=short
