name: UAID CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22' }
      - run: cd project-horizon && npm ci && npx prisma generate && npm run test && npm run build

  agents:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: cd uaid_agents && pip install -r requirements.txt && python -c "import py_compile; [py_compile.compile(f'uaid_agents/{m}', doraise=True) for m in ['complete_team.py','graphrag.py','dspy_pipeline.py','brain_sync.py']]"