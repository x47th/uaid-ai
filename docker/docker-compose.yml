version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: horizon-db
    environment:
      POSTGRES_USER: ${DB_USER:-horizon}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-horizon_secret}
      POSTGRES_DB: ${DB_NAME:-horizon}
    ports: ["5432:5432"]
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-horizon}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: horizon-redis
    ports: ["6379:6379"]
    volumes: ["redisdata:/data"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  backend:
    build: ./project-horizon
    container_name: horizon-api
    ports: ["3000:3000"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${DB_USER:-horizon}:${DB_PASSWORD:-horizon_secret}@postgres:5432/${DB_NAME:-horizon}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost}
      PORT: 3000

  frontend:
    build: ./horizon-frontend
    container_name: horizon-web
    ports: ["80:80"]
    depends_on: [backend]

volumes:
  pgdata:
  redisdata:
